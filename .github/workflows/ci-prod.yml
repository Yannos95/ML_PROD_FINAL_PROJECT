name: CD Production

on:
  push:
    branches: [ main ] # C'est ce qui manque pour déclencher l'action !

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo name
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY_OWNER,,}" >> ${GITHUB_ENV}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # On tag en 'latest' et 'prod' pour la branche main
          tags: |
            ghcr.io/${{ env.REPO_LC }}/iris-app:latest
            ghcr.io/${{ env.REPO_LC }}/iris-app:prod