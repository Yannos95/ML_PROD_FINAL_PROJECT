steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Cette étape transforme "Yannos95" en "yannos95"
      - name: Lowercase repo name
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY_OWNER,,}" >> ${GITHUB_ENV}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # On utilise maintenant env.REPO_LC qui est en minuscules
          tags: ghcr.io/${{ env.REPO_LC }}/iris-app:staging